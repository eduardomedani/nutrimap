<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriMap · Painel do Nutricionista</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F1EA;
    --bg-card: #FDFBF7;
    --bg-warm: #EDE7D8;
    --ink: #1A1F1B;
    --ink-soft: #4A524C;
    --ink-mute: #8A8F89;
    --moss: #3D4D3F;
    --moss-deep: #2A3A2C;
    --moss-light: #5C6E5E;
    --olive: #5C6B47;
    --sage: #87A082;
    --gold: #B8924A;
    --gold-soft: #D4B373;
    --terracotta: #B8674A;
    --rose: #A8534A;
    --cream: #F8F1DD;
    --line: #DDD6C5;
    --line-strong: #C3BBA8;
    --shadow: 0 4px 20px rgba(60,80,60,0.06);
    --shadow-lg: 0 10px 30px rgba(60,80,60,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(135,160,130,0.08), transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(184,146,74,0.06), transparent 45%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'Inter Tight', sans-serif;
    font-size: 14.5px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    padding: 24px;
  }
  .page { max-width: 1240px; margin: 0 auto; }

  /* TOPBAR */
  .topbar {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--moss), var(--olive));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--cream);
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 600; font-style: italic;
  }
  .brand-name {
    font-family: 'Fraunces', serif;
    font-size: 24px; color: var(--ink); font-weight: 500;
    letter-spacing: -0.01em;
  }
  .brand-name em { color: var(--moss); font-style: italic; font-weight: 400; }
  .brand-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--moss);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-top: 1px; font-weight: 600;
  }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .status-pill {
    background: var(--bg); padding: 7px 14px; border-radius: 100px;
    font-size: 12px; color: var(--ink-soft);
    display: flex; align-items: center; gap: 7px;
    border: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
  }
  .status-pill::before { content: ''; width: 7px; height: 7px; background: var(--sage); border-radius: 50%; }
  .status-pill.error::before { background: var(--rose); }
  .status-pill.warn::before { background: var(--gold); }

  .btn {
    background: var(--bg-warm); border: none; color: var(--ink);
    padding: 10px 20px; border-radius: 100px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--line); transform: translateY(-1px); }
  .btn.primary { background: var(--moss); color: var(--cream); }
  .btn.primary:hover { background: var(--moss-deep); }

  /* ===== CONFIG SECTION ===== */
  .config-bar {
    background: var(--bg-warm);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
    border-left: 4px solid var(--gold);
    display: none;
  }
  .config-bar.show { display: block; }
  .config-bar input {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    margin-top: 8px;
  }

  /* ===== LISTA DE PACIENTES ===== */
  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.4s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .list-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .list-title {
    font-family: 'Fraunces', serif;
    font-size: 28px; color: var(--ink); font-weight: 500;
  }
  .list-title em { color: var(--moss); font-style: italic; }

  .search-box {
    background: var(--bg-card);
    border: 1.5px solid var(--line);
    border-radius: 100px;
    padding: 10px 18px;
    display: flex; align-items: center; gap: 10px;
    width: 320px;
    max-width: 100%;
  }
  .search-box input {
    border: none; background: none; outline: none;
    font-family: 'Inter Tight', sans-serif; font-size: 14px;
    color: var(--ink); width: 100%;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 32px; color: var(--moss-deep); font-weight: 600;
    line-height: 1;
  }
  .stat-label {
    font-size: 12px; color: var(--ink-mute);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  .patients-grid { display: flex; flex-direction: column; gap: 10px; }
  .patient-row {
    background: var(--bg-card);
    border-radius: 14px;
    padding: 18px 22px;
    display: flex; align-items: center; gap: 18px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid transparent;
  }
  .patient-row:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    border-color: var(--sage);
  }
  .patient-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sage), var(--moss-light));
    color: var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600;
    flex-shrink: 0;
  }
  .patient-info { flex: 1; }
  .patient-name {
    font-size: 16px; font-weight: 600; color: var(--ink);
  }
  .patient-meta {
    font-size: 12.5px; color: var(--ink-mute);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }
  .patient-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--moss);
    background: var(--cream);
    padding: 4px 10px; border-radius: 8px;
  }
  .status-tag {
    font-size: 11px; padding: 4px 12px; border-radius: 100px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    font-family: 'JetBrains Mono', monospace;
  }
  .status-completo { background: rgba(135,160,130,0.2); color: var(--moss-deep); }
  .status-aguardando { background: rgba(184,146,74,0.15); color: var(--gold); }
  .patient-arrow { color: var(--ink-mute); font-size: 20px; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--ink-mute);
    background: var(--bg-card); border-radius: 16px;
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }

  .loading {
    text-align: center; padding: 60px 20px; color: var(--ink-mute);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--line);
    border-top-color: var(--moss);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══════════ RELATÓRIO INDIVIDUAL ═══════════ */
  .rel-topbar {
    display: flex; justify-content: space-between; margin-bottom: 20px;
  }
  .rel-hero {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 28px;
    display: flex; align-items: center; gap: 22px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .rel-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--moss), var(--olive));
    color: var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600;
    flex-shrink: 0;
  }
  .rel-hero-info { flex: 1; min-width: 200px; }
  .rel-name {
    font-family: 'Fraunces', serif; font-size: 30px;
    color: var(--ink); font-weight: 500; line-height: 1.1;
  }
  .rel-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--ink-soft); margin-top: 6px;
  }
  .rel-code-badge {
    display: inline-block; margin-top: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--cream); color: var(--moss);
    padding: 5px 12px; border-radius: 8px;
  }
  .rel-objetivo {
    background: linear-gradient(135deg, var(--cream), rgba(184,146,74,0.12));
    border-radius: 14px; padding: 16px 20px;
    border: 1px solid var(--gold-soft);
    min-width: 200px;
  }
  .rel-objetivo-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--moss);
    font-weight: 600;
  }
  .rel-objetivo-value {
    font-family: 'Fraunces', serif; font-size: 18px; color: var(--moss-deep);
    margin-top: 4px;
  }

  /* RADAR */
  .radar-card {
    background: var(--bg-card); border-radius: 18px; padding: 24px;
    box-shadow: var(--shadow); margin-bottom: 24px;
  }
  .radar-title {
    font-family: 'Fraunces', serif; font-size: 20px; color: var(--moss-deep);
    font-weight: 500; margin-bottom: 18px; text-align: center;
  }
  .radar-layout {
    display: grid; grid-template-columns: 300px 1fr; gap: 30px; align-items: center;
  }
  @media (max-width: 640px) { .radar-layout { grid-template-columns: 1fr; } }
  .radar-svg { width: 100%; max-width: 300px; margin: 0 auto; display: block; overflow: visible; }
  .radar-legend { display: flex; flex-direction: column; gap: 12px; }
  .radar-legend-item {}
  .radar-legend-top {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px;
  }
  .radar-legend-label { font-size: 14px; color: var(--ink); font-weight: 500; }
  .radar-legend-value {
    font-family: 'Fraunces', serif; font-size: 20px; color: var(--moss-deep); font-weight: 600;
  }
  .radar-legend-bar {
    height: 8px; background: var(--bg-warm); border-radius: 100px; overflow: hidden;
  }
  .radar-legend-fill { height: 100%; border-radius: 100px; transition: width 0.6s; }
  .radar-legend-fill.good { background: var(--sage); }
  .radar-legend-fill.mid { background: var(--gold-soft); }
  .radar-legend-fill.bad { background: var(--terracotta); }

  /* RED FLAGS */
  .rel-flags {
    background: var(--bg-card); border-radius: 18px; padding: 22px;
    box-shadow: var(--shadow); margin-bottom: 20px;
    border-left: 4px solid var(--terracotta);
  }
  .rel-flags-title {
    font-family: 'Fraunces', serif; font-size: 18px;
    color: var(--terracotta); margin-bottom: 14px; font-weight: 500;
  }
  .rel-flags-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px;
  }
  .flag-card {
    padding: 14px 16px; border-radius: 12px;
    background: var(--bg-warm);
  }
  .flag-alto { border-left: 3px solid var(--rose); }
  .flag-medio { border-left: 3px solid var(--gold); }
  .flag-tipo { font-weight: 600; font-size: 14px; color: var(--ink); }
  .flag-detalhe { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; }

  /* METRICS */
  .rel-metrics {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .metric-card {
    background: var(--bg-card); border-radius: 16px; padding: 20px;
    box-shadow: var(--shadow); text-align: center;
  }
  .metric-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute);
    font-weight: 600;
  }
  .metric-value {
    font-family: 'Fraunces', serif; font-size: 34px; font-weight: 600;
    margin: 8px 0 4px; line-height: 1;
  }
  .metric-sub { font-size: 12px; color: var(--ink-soft); }

  /* SECTIONS */
  .rel-sections {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }
  .secao-card {
    background: var(--bg-card); border-radius: 16px; padding: 22px;
    box-shadow: var(--shadow);
  }
  .secao-title {
    font-family: 'Fraunces', serif; font-size: 18px; color: var(--moss-deep);
    font-weight: 500; margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid var(--line);
  }
  .secao-rows { display: flex; flex-direction: column; gap: 10px; }
  .secao-row { display: flex; justify-content: space-between; gap: 16px; align-items: start; }
  .secao-key {
    font-size: 13px; color: var(--ink-mute); flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .secao-val { font-size: 14px; color: var(--ink); text-align: right; font-weight: 500; }

  /* Recordatório */
  .recordatorio-list { display: flex; flex-direction: column; gap: 12px; }
  .refeicao-item {
    background: var(--bg); border-radius: 10px; padding: 12px 14px;
  }
  .refeicao-head {
    display: flex; justify-content: space-between;
    font-weight: 600; font-size: 14px; color: var(--moss-deep);
    margin-bottom: 5px;
  }
  .refeicao-hora { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-mute); font-weight: 400; }
  .refeicao-desc { font-size: 13px; color: var(--ink-soft); }
  .ia-hint {
    margin-top: 14px; padding: 10px 14px;
    background: var(--cream); border-radius: 10px;
    font-size: 12px; color: var(--moss); font-family: 'JetBrains Mono', monospace;
  }

  /* Atividades */
  .ativ-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .ativ-tag {
    background: var(--cream); color: var(--moss-deep);
    padding: 6px 12px; border-radius: 100px; font-size: 12.5px; font-weight: 500;
  }

  .rel-disclaimer {
    margin-top: 24px; padding: 18px 22px;
    background: var(--bg-warm); border-radius: 14px;
    font-size: 12.5px; color: var(--ink-soft); line-height: 1.5;
    border-left: 4px solid var(--sage);
  }

  @media print {
    .rel-topbar, .topbar, .config-bar { display: none !important; }
    body { padding: 0; background: white; }
  }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .list-header { flex-direction: column; gap: 14px; align-items: stretch; }
    .search-box { width: 100%; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">N</div>
      <div>
        <div class="brand-name">Nutri<em>Map</em></div>
        <div class="brand-sub">Painel do Nutricionista</div>
      </div>
    </div>
    <div class="topbar-actions">
      <div class="status-pill" id="apiStatus">Verificando...</div>
      <button class="btn" onclick="toggleConfig()">⚙️ Config</button>
      <button class="btn" onclick="carregarPacientes()">🔄 Atualizar</button>
    </div>
  </div>

  <!-- CONFIG (escondido por padrão) -->
  <div class="config-bar" id="configBar">
    <div style="font-size: 13px; color: var(--ink-soft); font-weight: 500;">URL do Apps Script:</div>
    <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec" />
    <button class="btn primary" style="margin-top: 10px;" onclick="salvarConfig()">Salvar e conectar</button>
  </div>

  <!-- ═══════════ VIEW 1: LISTA DE PACIENTES ═══════════ -->
  <div class="view active" id="view-lista">

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total pacientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-completos">—</div>
        <div class="stat-label">Completos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-aguardando">—</div>
        <div class="stat-label">Aguardando</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-taxa">—</div>
        <div class="stat-label">Taxa conclusão</div>
      </div>
    </div>

    <div class="list-header">
      <div class="list-title">Seus <em>pacientes</em></div>
      <div class="search-box">
        🔍 <input type="text" id="searchInput" placeholder="Buscar por nome ou código..." oninput="filtrarPacientes()" />
      </div>
    </div>

    <div id="patientsContainer">
      <div class="loading">
        <div class="spinner"></div>
        Carregando pacientes...
      </div>
    </div>
  </div>

  <!-- ═══════════ VIEW 2: RELATÓRIO INDIVIDUAL ═══════════ -->
  <div class="view" id="view-relatorio">
    <!-- Conteúdo gerado dinamicamente -->
  </div>

</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // CONFIGURAÇÃO
  // ═══════════════════════════════════════════════════════════
  const API_URL_KEY = 'nutrimap_dashboard_api_url';
  let apiUrl = localStorage.getItem(API_URL_KEY) || '';
  let todosPacientes = [];

  // ═══════════════════════════════════════════════════════════
  // UI HELPERS
  // ═══════════════════════════════════════════════════════════
  function atualizarStatus(estado, msg) {
    const el = document.getElementById('apiStatus');
    el.className = 'status-pill ' + estado;
    el.textContent = msg;
  }

  function toggleConfig() {
    document.getElementById('configBar').classList.toggle('show');
  }

  function salvarConfig() {
    const url = document.getElementById('apiUrlInput').value.trim();
    if (!url) { alert('Cole a URL do Apps Script'); return; }
    apiUrl = url;
    localStorage.setItem(API_URL_KEY, url);
    document.getElementById('configBar').classList.remove('show');
    carregarPacientes();
  }

  function mostrarView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ═══════════════════════════════════════════════════════════
  // CARREGAR LISTA DE PACIENTES
  // ═══════════════════════════════════════════════════════════
  async function carregarPacientes() {
    if (!apiUrl) {
      atualizarStatus('error', 'Configure a URL');
      document.getElementById('configBar').classList.add('show');
      return;
    }

    atualizarStatus('warn', 'Carregando...');
    document.getElementById('patientsContainer').innerHTML =
      '<div class="loading"><div class="spinner"></div>Carregando pacientes...</div>';

    try {
      const resp = await fetch(apiUrl + '?action=listar_pacientes');
      const data = await resp.json();

      if (data.ok) {
        todosPacientes = data.pacientes || [];
        atualizarStatus('', 'Conectado');
        renderizarEstatisticas();
        renderizarPacientes(todosPacientes);
      } else {
        atualizarStatus('error', 'Erro na API');
      }
    } catch (erro) {
      atualizarStatus('error', 'Falha de conexão');
      console.error(erro);
      document.getElementById('patientsContainer').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div>Não foi possível conectar. Verifique a URL nas configurações.</div>';
    }
  }

  function renderizarEstatisticas() {
    const total = todosPacientes.length;
    const completos = todosPacientes.filter(p => (p.status || '').toLowerCase() === 'completo').length;
    const aguardando = total - completos;
    const taxa = total > 0 ? Math.round((completos / total) * 100) : 0;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-completos').textContent = completos;
    document.getElementById('stat-aguardando').textContent = aguardando;
    document.getElementById('stat-taxa').textContent = taxa + '%';
  }

  function renderizarPacientes(lista) {
    const container = document.getElementById('patientsContainer');

    if (lista.length === 0) {
      container.innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">📭</div>Nenhum paciente encontrado.</div>';
      return;
    }

    // Ordenar: mais recentes primeiro
    const ordenados = [...lista].sort((a, b) => new Date(b.criado_em) - new Date(a.criado_em));

    container.innerHTML = '<div class="patients-grid">' + ordenados.map(p => {
      const iniciais = (p.nome || '?').split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
      const status = (p.status || 'aguardando').toLowerCase();
      const podeAbrir = status === 'completo';

      return `
        <div class="patient-row" onclick="${podeAbrir ? `abrirRelatorio('${p.codigo}')` : `avisarIncompleto()`}">
          <div class="patient-avatar">${iniciais}</div>
          <div class="patient-info">
            <div class="patient-name">${p.nome || '(sem nome)'}</div>
            <div class="patient-meta">Criado em ${formatarData(p.criado_em)}</div>
          </div>
          <span class="patient-code">${p.codigo}</span>
          <span class="status-tag status-${status}">${status}</span>
          <span class="patient-arrow">→</span>
        </div>
      `;
    }).join('') + '</div>';
  }

  function filtrarPacientes() {
    const termo = document.getElementById('searchInput').value.toLowerCase();
    const filtrados = todosPacientes.filter(p =>
      (p.nome || '').toLowerCase().includes(termo) ||
      (p.codigo || '').toLowerCase().includes(termo)
    );
    renderizarPacientes(filtrados);
  }

  function avisarIncompleto() {
    alert('Este paciente ainda não completou o questionário. O relatório estará disponível quando ele finalizar.');
  }

  function formatarData(data) {
    if (!data) return '—';
    const d = new Date(data);
    if (isNaN(d.getTime())) return String(data);
    return d.toLocaleDateString('pt-BR');
  }

  // ═══════════════════════════════════════════════════════════
  // ABRIR RELATÓRIO — busca dados e renderiza
  // ═══════════════════════════════════════════════════════════
  async function abrirRelatorio(codigo) {
    mostrarView('view-relatorio');
    document.getElementById('view-relatorio').innerHTML =
      '<div class="loading"><div class="spinner"></div>Carregando relatório...</div>';

    try {
      const resp = await fetch(apiUrl + '?action=obter_paciente&codigo=' + encodeURIComponent(codigo));
      const data = await resp.json();

      if (data.ok) {
        renderizarRelatorio(data);
      } else {
        document.getElementById('view-relatorio').innerHTML =
          `<div class="empty-state"><div class="empty-state-icon">⚠️</div>${data.erro || 'Erro ao carregar'}</div>
           <div style="text-align:center; margin-top:20px;"><button class="btn" onclick="mostrarView('view-lista')">← Voltar</button></div>`;
      }
    } catch (erro) {
      console.error(erro);
      document.getElementById('view-relatorio').innerHTML =
        `<div class="empty-state"><div class="empty-state-icon">⚠️</div>Falha ao carregar o relatório</div>
         <div style="text-align:center; margin-top:20px;"><button class="btn" onclick="mostrarView('view-lista')">← Voltar</button></div>`;
    }
  }

  // ═══════════════════════════════════════════════════════════
  // CÁLCULOS CLÍNICOS
  // ═══════════════════════════════════════════════════════════
  const CALC = {
    idade(nascimento) {
      if (!nascimento) return null;
      const nasc = new Date(nascimento);
      if (isNaN(nasc.getTime())) return null;
      const hoje = new Date();
      let idade = hoje.getFullYear() - nasc.getFullYear();
      const m = hoje.getMonth() - nasc.getMonth();
      if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
      return idade;
    },

    imc(peso, altura) {
      peso = parseFloat(peso); altura = parseFloat(altura);
      if (!peso || !altura) return null;
      const alturaM = altura > 3 ? altura / 100 : altura; // aceita cm ou m
      return +(peso / (alturaM * alturaM)).toFixed(1);
    },

    classificarIMC(imc) {
      if (imc === null) return { label: '—', cor: 'var(--ink-mute)' };
      if (imc < 18.5) return { label: 'Abaixo do peso', cor: 'var(--gold)' };
      if (imc < 25) return { label: 'Peso normal', cor: 'var(--sage)' };
      if (imc < 30) return { label: 'Sobrepeso', cor: 'var(--gold)' };
      if (imc < 35) return { label: 'Obesidade I', cor: 'var(--terracotta)' };
      if (imc < 40) return { label: 'Obesidade II', cor: 'var(--terracotta)' };
      return { label: 'Obesidade III', cor: 'var(--rose)' };
    },

    // PSQI: soma simplificada dos componentes (0-21)
    psqi(m6) {
      if (!m6) return null;
      let score = 0;
      // Componente qualidade subjetiva
      score += parseInt(m6.q6_qualidade) || 0;
      // Latência (tempo pra dormir)
      const lat = parseInt(m6.latencia_min) || 0;
      if (lat > 60) score += 3; else if (lat > 30) score += 2; else if (lat > 15) score += 1;
      // Distúrbios (5a-5d)
      const dist = (parseInt(m6.q5a)||0) + (parseInt(m6.q5b)||0) + (parseInt(m6.q5c)||0) + (parseInt(m6.q5d)||0);
      if (dist > 9) score += 3; else if (dist > 6) score += 2; else if (dist > 0) score += 1;
      // Medicação
      score += parseInt(m6.q7_medicacao) || 0;
      // Disfunção diurna (sonolência + disposição)
      const diurna = (parseInt(m6.q8_sonolencia)||0) + (parseInt(m6.q9_disposicao)||0);
      if (diurna > 4) score += 3; else if (diurna > 2) score += 2; else if (diurna > 0) score += 1;
      // Duração do sono
      const horas = parseFloat(m6.horas_sono) || 0;
      if (horas < 5) score += 3; else if (horas < 6) score += 2; else if (horas < 7) score += 1;
      return Math.min(score, 21);
    },

    classificarPSQI(score) {
      if (score === null) return { label: '—', cor: 'var(--ink-mute)' };
      if (score <= 5) return { label: 'Bom', cor: 'var(--sage)' };
      if (score <= 10) return { label: 'Ruim', cor: 'var(--gold)' };
      return { label: 'Muito ruim', cor: 'var(--rose)' };
    },

    // MEQ: soma das 7 respostas → cronotipo
    meq(m6) {
      if (!m6) return null;
      let score = 0;
      for (let i = 1; i <= 7; i++) {
        score += parseInt(m6['meq_' + i]) || 0;
      }
      return score;
    },

    classificarCronotipo(score) {
      if (score === null) return { label: '—', emoji: '', cor: 'var(--ink-mute)' };
      // Escala adaptada (máx ~33)
      if (score >= 24) return { label: 'Matutino', emoji: '🌅', cor: 'var(--gold)' };
      if (score >= 18) return { label: 'Intermediário-matutino', emoji: '🌤️', cor: 'var(--sage)' };
      if (score >= 12) return { label: 'Intermediário-vespertino', emoji: '🌆', cor: 'var(--moss-light)' };
      return { label: 'Vespertino', emoji: '🌙', cor: 'var(--moss)' };
    },

    // TMB Mifflin-St Jeor
    tmb(peso, altura, idade, sexo) {
      peso = parseFloat(peso); altura = parseFloat(altura); idade = parseInt(idade);
      if (!peso || !altura || !idade) return null;
      const alturaCm = altura < 3 ? altura * 100 : altura;
      const base = (10 * peso) + (6.25 * alturaCm) - (5 * idade);
      const ehHomem = (sexo || '').toLowerCase().includes('masc');
      return Math.round(base + (ehHomem ? 5 : -161));
    },

    // GET usando METs das atividades + NEAT
    get(tmb, m10) {
      if (!tmb) return null;
      let fatorBase = 1.2; // sedentário base

      // Ajuste pelo NEAT
      const neat = (m10 && m10.nivel_neat || '').toLowerCase();
      if (neat.includes('leve')) fatorBase = 1.375;
      else if (neat.includes('moderad')) fatorBase = 1.55;
      else if (neat.includes('ativo')) fatorBase = 1.725;

      let getBase = Math.round(tmb * fatorBase);
      return getBase;
    },

    // ═══ SCORES DO RADAR (0-100, quanto maior melhor) ═══

    scoreSono(m6, psqiScore) {
      if (psqiScore === null) return null;
      // PSQI vai de 0 (ótimo) a 21 (péssimo). Invertemos para 0-100.
      return Math.round(Math.max(0, 100 - (psqiScore / 21) * 100));
    },

    scoreAlimentacao(m9) {
      if (!m9) return null;
      // Mapa de frequência → pontos
      const freqMap = { 'Nunca': 0, '1-2x/sem': 1, '3-4x/sem': 2, '5-6x/sem': 3, 'Diariamente': 4, '+1x/dia': 5 };
      // Grupos saudáveis (quanto mais, melhor)
      const saudaveis = ['frutas', 'verduras', 'frango_peixe', 'ovos', 'lacteos', 'leguminosas', 'integrais', 'oleaginosas'];
      // Grupos de risco (quanto mais, pior)
      const risco = ['doces', 'ultraprocessados', 'fastfood', 'refrigerantes'];

      let pontosBons = 0, maxBons = saudaveis.length * 5;
      saudaveis.forEach(g => { pontosBons += (freqMap[m9[g]] || 0); });

      let pontosRuins = 0, maxRuins = risco.length * 5;
      risco.forEach(g => { pontosRuins += (freqMap[m9[g]] || 0); });

      // Score: % de bons - penalidade dos ruins
      const scoreBons = (pontosBons / maxBons) * 100;
      const penalidade = (pontosRuins / maxRuins) * 60; // risco pesa até -60
      return Math.round(Math.max(0, Math.min(100, scoreBons - penalidade + 30)));
    },

    scoreAtividade(m10) {
      if (!m10) return null;
      const pratica = (m10.pratica || '').toLowerCase();
      let base = 0;
      if (pratica.includes('sim')) base = 50;
      else if (pratica.includes('espor')) base = 25;

      // Bônus por NEAT
      const neat = (m10.nivel_neat || '').toLowerCase();
      if (neat.includes('ativo')) base += 30;
      else if (neat.includes('moderad')) base += 20;
      else if (neat.includes('leve')) base += 10;

      // Bônus por atividades detalhadas
      if (m10.detalhes_atividades_json) {
        try {
          const det = typeof m10.detalhes_atividades_json === 'string'
            ? JSON.parse(m10.detalhes_atividades_json) : m10.detalhes_atividades_json;
          const numAtividades = Object.keys(det).length;
          base += Math.min(numAtividades * 7, 20);
        } catch (e) {}
      }
      return Math.round(Math.min(100, base));
    },

    scoreComportamento(m7) {
      if (!m7) return null;
      let score = 50; // base neutra
      // Mastigação lenta é melhor
      const mast = (m7.q7_5_mastigacao || '').toLowerCase();
      if (mast.includes('lenta')) score += 15;
      else if (mast.includes('rápida') || mast.includes('rapida')) score -= 15;
      // Não comer muito à noite é melhor
      const noite = (m7.q7_4_come_noite || '').toLowerCase();
      if (noite === 'não' || noite === 'nao') score += 15;
      else if (noite === 'sim') score -= 10;
      // Apetite controlado
      const apetite = (m7.q7_1_apetite || '').toLowerCase();
      if (apetite.includes('bom')) score += 20;
      else if (apetite.includes('excessivo')) score -= 15;
      return Math.round(Math.max(0, Math.min(100, score)));
    },

    scoreMindset(m13) {
      if (!m13) return null;
      const habitos = parseInt(m13.q13_1_habitos_atuais) || 0;
      const capacidade = parseInt(m13.q13_2_capacidade_mudar) || 0;
      // Média dos dois sliders (0-10) → 0-100
      // Capacidade pesa mais (motivação para mudar)
      const score = ((habitos * 0.4) + (capacidade * 0.6)) * 10;
      return Math.round(Math.max(0, Math.min(100, score)));
    }
  };

  // ═══════════════════════════════════════════════════════════
  // RED FLAGS (alertas automáticos)
  // ═══════════════════════════════════════════════════════════
  function detectarRedFlags(d, calc) {
    const flags = [];
    const m = d.modulos;

    if (calc.imc !== null && calc.imc >= 30)
      flags.push({ tipo: 'IMC elevado', detalhe: `IMC ${calc.imc} indica obesidade`, nivel: 'alto' });
    if (calc.imc !== null && calc.imc < 18.5)
      flags.push({ tipo: 'Baixo peso', detalhe: `IMC ${calc.imc} abaixo do saudável`, nivel: 'medio' });
    if (calc.psqiScore !== null && calc.psqiScore > 10)
      flags.push({ tipo: 'Sono muito comprometido', detalhe: `PSQI ${calc.psqiScore}/21`, nivel: 'alto' });

    // Patologias relevantes
    if (m.m3 && m.m3.q3_1_patologias) {
      const pat = String(m.m3.q3_1_patologias).toLowerCase();
      if (pat.includes('diabet')) flags.push({ tipo: 'Diabetes', detalhe: 'Requer atenção a carboidratos', nivel: 'alto' });
      if (pat.includes('hipertens') || pat.includes('pressão')) flags.push({ tipo: 'Hipertensão', detalhe: 'Atenção ao sódio', nivel: 'alto' });
      if (pat.includes('renal') || pat.includes('rim')) flags.push({ tipo: 'Questão renal', detalhe: 'Cautela com proteína', nivel: 'alto' });
    }

    // Ultraprocessados/fast-food frequentes
    if (m.m9) {
      const freqRuim = ['Diariamente', '+1x/dia', '5-6x/sem'];
      if (freqRuim.includes(m.m9.ultraprocessados)) flags.push({ tipo: 'Ultraprocessados frequentes', detalhe: m.m9.ultraprocessados, nivel: 'medio' });
      if (freqRuim.includes(m.m9.fastfood)) flags.push({ tipo: 'Fast-food frequente', detalhe: m.m9.fastfood, nivel: 'medio' });
    }

    return flags;
  }

  // ═══════════════════════════════════════════════════════════
  // RENDERIZAR RELATÓRIO
  // ═══════════════════════════════════════════════════════════
  function renderizarRelatorio(d) {
    const m = d.modulos;
    const p = d.paciente;

    // Calcular tudo
    const nascimento = m.m1 ? m.m1.q1_4_nascimento : null;
    const idade = CALC.idade(nascimento);
    const sexo = m.m1 ? m.m1.q1_5_sexo : '';
    const peso = m.m4 ? m.m4.q4_1_peso_atual : null;
    const altura = m.m4 ? m.m4.q4_2_altura : null;
    const pesoDesejado = m.m4 ? m.m4.q4_4_peso_desejado : null;

    const calc = {};
    calc.imc = CALC.imc(peso, altura);
    calc.imcClass = CALC.classificarIMC(calc.imc);
    calc.psqiScore = CALC.psqi(m.m6);
    calc.psqiClass = CALC.classificarPSQI(calc.psqiScore);
    calc.meqScore = CALC.meq(m.m6);
    calc.cronotipo = CALC.classificarCronotipo(calc.meqScore);
    calc.tmb = CALC.tmb(peso, altura, idade, sexo);
    calc.get = CALC.get(calc.tmb, m.m10);

    // Scores do radar
    const radarScores = [
      { label: 'Sono', valor: CALC.scoreSono(m.m6, calc.psqiScore) },
      { label: 'Alimentação', valor: CALC.scoreAlimentacao(m.m9) },
      { label: 'Atividade', valor: CALC.scoreAtividade(m.m10) },
      { label: 'Comportamento', valor: CALC.scoreComportamento(m.m7) },
      { label: 'Mindset', valor: CALC.scoreMindset(m.m13) }
    ];

    const redFlags = detectarRedFlags(d, calc);
    const nome = (m.m1 && m.m1.q1_1_nome) || p.nome || 'Paciente';
    const iniciais = nome.split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();

    const html = `
      <div class="rel-topbar">
        <button class="btn" onclick="mostrarView('view-lista')">← Voltar</button>
        <button class="btn primary" onclick="window.print()">🖨️ Imprimir / PDF</button>
      </div>

      <div class="rel-hero">
        <div class="rel-avatar">${iniciais}</div>
        <div class="rel-hero-info">
          <h1 class="rel-name">${nome}</h1>
          <div class="rel-meta">
            ${idade ? idade + ' anos' : ''} ${sexo ? '· ' + sexo : ''} ${m.m1 && m.m1.q1_6_cidade ? '· ' + m.m1.q1_6_cidade : ''}
          </div>
          <div class="rel-code-badge">${d.codigo}</div>
        </div>
        ${m.m2 && m.m2.q2_1_objetivo_principal ? `
        <div class="rel-objetivo">
          <div class="rel-objetivo-label">Objetivo principal</div>
          <div class="rel-objetivo-value">${m.m2.q2_1_objetivo_principal}</div>
        </div>` : ''}
      </div>

      ${redFlags.length > 0 ? `
      <div class="rel-flags">
        <div class="rel-flags-title">⚠️ ${redFlags.length} ${redFlags.length === 1 ? 'ponto de atenção' : 'pontos de atenção'}</div>
        <div class="rel-flags-grid">
          ${redFlags.map(f => `
            <div class="flag-card flag-${f.nivel}">
              <div class="flag-tipo">${f.tipo}</div>
              <div class="flag-detalhe">${f.detalhe}</div>
            </div>
          `).join('')}
        </div>
      </div>` : ''}

      <div class="rel-metrics">
        ${metricCard('IMC', calc.imc !== null ? calc.imc : '—', calc.imcClass.label, calc.imcClass.cor)}
        ${metricCard('Peso atual', peso ? peso + ' kg' : '—', pesoDesejado ? 'Meta: ' + pesoDesejado + ' kg' : '', 'var(--moss)')}
        ${metricCard('PSQI (sono)', calc.psqiScore !== null ? calc.psqiScore + '/21' : '—', calc.psqiClass.label, calc.psqiClass.cor)}
        ${metricCard('Cronotipo', calc.cronotipo.emoji || '—', calc.cronotipo.label, calc.cronotipo.cor)}
        ${metricCard('TMB', calc.tmb ? calc.tmb + ' kcal' : '—', 'Metabolismo basal', 'var(--olive)')}
        ${metricCard('GET estimado', calc.get ? calc.get + ' kcal' : '—', 'Gasto total/dia', 'var(--olive)')}
      </div>

      ${gerarRadar(radarScores)}

      ${renderModulosDetalhados(m)}

      <div class="rel-disclaimer">
        ⚕️ Este relatório é uma <strong>estimativa preliminar gerada automaticamente</strong> a partir das respostas do paciente. Todos os dados, cálculos e estimativas devem ser <strong>validados pelo nutricionista</strong> antes de qualquer conduta clínica. Não constitui diagnóstico.
      </div>
    `;

    document.getElementById('view-relatorio').innerHTML = html;
  }

  function metricCard(label, valor, sub, cor) {
    return `
      <div class="metric-card">
        <div class="metric-label">${label}</div>
        <div class="metric-value" style="color: ${cor};">${valor}</div>
        ${sub ? `<div class="metric-sub">${sub}</div>` : ''}
      </div>
    `;
  }

  // ═══════════════════════════════════════════════════════════
  // RADAR CHART (SVG dinâmico de 5 eixos)
  // ═══════════════════════════════════════════════════════════
  function gerarRadar(scores) {
    // scores = [{label, valor, cor}], 5 eixos
    const cx = 160, cy = 160, raio = 120;
    const n = scores.length;
    const anguloInicial = -Math.PI / 2; // começa no topo

    function ponto(indice, distancia) {
      const ang = anguloInicial + (2 * Math.PI * indice / n);
      return {
        x: cx + Math.cos(ang) * distancia,
        y: cy + Math.sin(ang) * distancia
      };
    }

    // Grades concêntricas (4 níveis)
    let gradesHtml = '';
    for (let nivel = 1; nivel <= 4; nivel++) {
      const r = (raio * nivel) / 4;
      const pts = scores.map((_, i) => { const p = ponto(i, r); return `${p.x.toFixed(1)},${p.y.toFixed(1)}`; }).join(' ');
      gradesHtml += `<polygon points="${pts}" />`;
    }

    // Linhas radiais
    let linhasHtml = '';
    scores.forEach((_, i) => {
      const p = ponto(i, raio);
      linhasHtml += `<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" />`;
    });

    // Polígono dos dados
    const pontosData = scores.map((s, i) => {
      const valor = s.valor !== null ? s.valor : 0;
      const p = ponto(i, (raio * valor) / 100);
      return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    }).join(' ');

    // Pontos (círculos) nos vértices
    let circulosHtml = '';
    scores.forEach((s, i) => {
      const valor = s.valor !== null ? s.valor : 0;
      const p = ponto(i, (raio * valor) / 100);
      circulosHtml += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5"/>`;
    });

    // Labels dos eixos
    let labelsHtml = '';
    scores.forEach((s, i) => {
      const p = ponto(i, raio + 22);
      let anchor = 'middle';
      if (p.x < cx - 10) anchor = 'end';
      else if (p.x > cx + 10) anchor = 'start';
      labelsHtml += `<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" text-anchor="${anchor}">${s.label.toUpperCase()}</text>`;
    });

    const svg = `
      <svg viewBox="0 0 320 320" class="radar-svg" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#DDD6C5" fill="none" stroke-width="1">${gradesHtml}</g>
        <g stroke="#C3BBA8" stroke-width="1">${linhasHtml}</g>
        <polygon points="${pontosData}" fill="rgba(61,77,63,0.18)" stroke="#3D4D3F" stroke-width="2.5"/>
        <g fill="#2A3A2C">${circulosHtml}</g>
        <g font-family="Inter Tight, sans-serif" font-size="10" fill="#4A524C" font-weight="600">${labelsHtml}</g>
      </svg>
    `;

    // Legenda com barras
    const legendaHtml = scores.map(s => {
      const valor = s.valor !== null ? s.valor : 0;
      const classe = valor >= 60 ? 'good' : (valor >= 40 ? 'mid' : 'bad');
      return `
        <div class="radar-legend-item">
          <div class="radar-legend-top">
            <span class="radar-legend-label">${s.label}</span>
            <span class="radar-legend-value">${s.valor !== null ? s.valor : '—'}</span>
          </div>
          <div class="radar-legend-bar"><div class="radar-legend-fill ${classe}" style="width: ${valor}%;"></div></div>
        </div>
      `;
    }).join('');

    return `
      <div class="radar-card">
        <div class="radar-title">Mapa Nutricional</div>
        <div class="radar-layout">
          ${svg}
          <div class="radar-legend">${legendaHtml}</div>
        </div>
      </div>
    `;
  }

  function renderModulosDetalhados(m) {
    let html = '<div class="rel-sections">';

    // Objetivo & motivação
    if (m.m2) {
      html += secaoCard('🎯 Objetivo & Motivação', [
        ['Objetivo principal', m.m2.q2_1_objetivo_principal],
        ['Objetivo secundário', m.m2.q2_2_objetivo_secundario],
        ['Por quê agora', m.m2.q2_3_por_que],
        ['Alinhamento atual', m.m2.q2_7_alinhamento ? m.m2.q2_7_alinhamento + '/10' : null],
        ['Maiores dificuldades', m.m2.q2_8_dificuldades]
      ]);
    }

    // Histórico clínico
    if (m.m3) {
      html += secaoCard('🩺 Histórico Clínico', [
        ['Patologias', m.m3.q3_1_patologias],
        ['Medicamentos', m.m3.q3_3_medicamentos],
        ['Alergias/intolerâncias', m.m3.q3_5_alergias],
        ['Exames', (m.m3exames && m.m3exames.length) ? m.m3exames.length + ' arquivo(s) enviado(s)' : 'Nenhum']
      ]);
    }

    // Estilo de vida
    if (m.m5) {
      html += secaoCard('🏠 Estilo de Vida', [
        ['Quem cozinha', m.m5.q5_4_quem_cozinha],
        ['Nível de estresse', m.m5.q5_8_estresse],
        ['Fuma', m.m5.q5_9_fuma],
        ['Álcool', m.m5.q5_10_alcool],
        ['Hidratação', m.m5.q5_12_agua]
      ]);
    }

    // Comportamento alimentar
    if (m.m7) {
      html += secaoCard('🍽️ Comportamento Alimentar', [
        ['Apetite', m.m7.q7_1_apetite],
        ['Preferência de sabor', m.m7.q7_2_sabor],
        ['Maior fome', m.m7.q7_3_maior_fome],
        ['Mastigação', m.m7.q7_5_mastigacao],
        ['Não gosta', m.m7.q7_9_nao_gosta],
        ['Gosta muito', m.m7.q7_10_gosta_muito]
      ]);
    }

    // Recordatório 24h
    if (m.m8) {
      const refeicoes = [
        ['☀️ Café da manhã', m.m8.cafe_faz, m.m8.cafe_descricao, m.m8.cafe_horario],
        ['🍎 Lanche manhã', m.m8.lanche_manha_faz, m.m8.lanche_manha_descricao, m.m8.lanche_manha_horario],
        ['🍽️ Almoço', m.m8.almoco_faz, m.m8.almoco_descricao, m.m8.almoco_horario],
        ['🥪 Lanche tarde', m.m8.lanche_tarde_faz, m.m8.lanche_tarde_descricao, m.m8.lanche_tarde_horario],
        ['🌙 Jantar', m.m8.jantar_faz, m.m8.jantar_descricao, m.m8.jantar_horario],
        ['🌌 Ceia', m.m8.ceia_faz, m.m8.ceia_descricao, m.m8.ceia_horario]
      ];
      html += `<div class="secao-card">
        <div class="secao-title">📋 Recordatório 24h</div>
        <div class="recordatorio-list">
          ${refeicoes.filter(r => (r[1]||'').toLowerCase() !== 'não').map(r => `
            <div class="refeicao-item">
              <div class="refeicao-head"><span>${r[0]}</span>${r[3] ? `<span class="refeicao-hora">${r[3]}</span>` : ''}</div>
              <div class="refeicao-desc">${r[2] || '<em style="color:var(--ink-mute)">Sem descrição</em>'}</div>
            </div>
          `).join('')}
        </div>
        <div class="ia-hint">⚛ A análise de calorias e macros por IA será processada aqui (em breve)</div>
      </div>`;
    }

    // Atividade física
    if (m.m10) {
      let atividadesHtml = '';
      if (m.m10.detalhes_atividades_json) {
        try {
          const det = typeof m.m10.detalhes_atividades_json === 'string'
            ? JSON.parse(m.m10.detalhes_atividades_json) : m.m10.detalhes_atividades_json;
          const nomes = { q10_caminhada:'🚶 Caminhada', q10_corrida:'🏃 Corrida', q10_musc:'🏋 Musculação', q10_crossfit:'🔥 CrossFit', q10_bike:'🚴 Ciclismo', q10_natacao:'🏊 Natação', q10_pilates:'🧘 Pilates', q10_danca:'💃 Dança', q10_futebol:'⚽ Futebol', q10_basquete:'🏀 Basquete', q10_volei:'🏐 Vôlei', q10_tenis:'🎾 Tênis', q10_tmesa:'🏓 Tênis mesa', q10_boxe:'🥊 Boxe', q10_artes:'🥋 Artes Marciais' };
          atividadesHtml = Object.keys(det).map(k =>
            `<div class="ativ-tag">${nomes[k] || k}: ${det[k].frequencia || '?'}x/sem · ${det[k].intensidade || '?'}</div>`
          ).join('');
        } catch (e) {}
      }
      html += `<div class="secao-card">
        <div class="secao-title">🏃 Atividade Física</div>
        <div class="secao-rows">
          <div class="secao-row"><span class="secao-key">Pratica</span><span class="secao-val">${m.m10.pratica || '—'}</span></div>
          <div class="secao-row"><span class="secao-key">Nível diário (NEAT)</span><span class="secao-val">${m.m10.nivel_neat || '—'}</span></div>
          <div class="secao-row"><span class="secao-key">Passos/dia</span><span class="secao-val">${m.m10.passos_dia || '—'}</span></div>
        </div>
        ${atividadesHtml ? `<div class="ativ-tags">${atividadesHtml}</div>` : ''}
      </div>`;
    }

    // Mindset
    if (m.m13) {
      html += secaoCard('🧠 Mindset & Adesão', [
        ['Hábitos atuais', m.m13.q13_1_habitos_atuais ? m.m13.q13_1_habitos_atuais + '/10' : null],
        ['Capacidade de mudar', m.m13.q13_2_capacidade_mudar ? m.m13.q13_2_capacidade_mudar + '/10' : null],
        ['Suporte do ambiente', m.m13.q13_3_suporte],
        ['Já tentou', m.m13.q13_4_metodos_tentados],
        ['O que não funcionou', m.m13.q13_5_nao_funcionou],
        ['Algo mais', m.m13.q13_7_algo_mais]
      ]);
    }

    html += '</div>';
    return html;
  }

  function secaoCard(titulo, pares) {
    const rows = pares
      .filter(([k, v]) => v !== null && v !== undefined && v !== '')
      .map(([k, v]) => `
        <div class="secao-row">
          <span class="secao-key">${k}</span>
          <span class="secao-val">${v}</span>
        </div>
      `).join('');
    if (!rows) return '';
    return `
      <div class="secao-card">
        <div class="secao-title">${titulo}</div>
        <div class="secao-rows">${rows}</div>
      </div>
    `;
  }

  // ═══════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════
  document.addEventListener('DOMContentLoaded', () => {
    if (apiUrl) {
      document.getElementById('apiUrlInput').value = apiUrl;
      carregarPacientes();
    } else {
      atualizarStatus('error', 'Configure a URL');
      document.getElementById('configBar').classList.add('show');
    }
  });
</script>

</body>
</html>
